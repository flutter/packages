# Builds the all_packages app with AGP >= 9 to verify compatibility.
tasks:
  - name: prepare tool
    script: .ci/scripts/prepare_tool.sh
    infra_step: true # Note infra steps failing prevents "always" from running.
  - name: create all_packages app
    script: .ci/scripts/create_all_packages_app.sh
    infra_step: true # Note infra steps failing prevents "always" from running.
  - name: set AGP >= 9
    script: .ci/scripts/set_agp_version.sh
    args: ["9.0.0", "8.13"]
  - name: build all_packages for Android debug (AGP >= 9)
    script: .ci/scripts/build_all_packages_app.sh
    args: ["apk", "debug"]
  - name: build all_packages for Android release (AGP >= 9)
    script: .ci/scripts/build_all_packages_app.sh
    args: ["apk", "release"]

