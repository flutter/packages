name: cross_file_web_example
publish_to: none

environment:
  sdk: ^3.10.0
  flutter: ">=3.38.0"

dependencies:
  file_selector:
    git:
      url: https://github.com/bparrishMines/packages
      ref: new_file_selector
      path: packages/file_selector/file_selector
  flutter:
    sdk: flutter
  mime: ^2.0.0

dev_dependencies:
  cross_file_platform_interface:
    git:
      url: https://github.com/bparrishMines/packages
      ref: new_crossfile
      path: packages/cross_file/cross_file_platform_interface
  cross_file_web:
    git:
      url: https://github.com/bparrishMines/packages
      ref: new_crossfile
      path: packages/cross_file/cross_file_web
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  web: ">=0.5.1 <2.0.0"

dependency_overrides:
  # TODO(bparrishMines): This should be moved to dependencies. This is currently placed here because
  # the updated file_selector branch depends on cross_file_web from git and this overrides its
  # dependency.
  cross_file_web:
    # When depending on this package from a real application you should use:
    #   cross_file_web: ^x.y.z
    # See https://dart.dev/tools/pub/dependencies#version-constraints
    # The example app is bundled with the plugin so we use a path dependency on
    # the parent directory to use the current plugin's version.
    path: ../
