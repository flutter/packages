name: material_ui_examples
description: API code samples for the material_ui package.
publish_to: 'none'

version: 1.0.0

environment:
  sdk: ^3.12.0

resolution: workspace

dependencies:
  flutter:
    sdk: flutter

  collection: ^1.19.1
  test: ^1.31.0
  vector_math: ^2.2.0
  web: ^1.1.1

  material_ui:
    path: ..
  cupertino_ui:
    # TODO(justinmc): Use the pub.dev package when published.
    path: ../../cupertino_ui

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter
  flutter_goldens:
    path: ../../../script/flutter_goldens
  flutter_localizations:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
