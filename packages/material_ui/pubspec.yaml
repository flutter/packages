name: material_ui
description: The official Flutter Material UI Library, implementing Google's Material Design design system.
version: 0.0.2
repository: https://github.com/flutter/packages/tree/main/packages/material_ui
issue_tracker:  https://github.com/flutter/flutter/issues?q=is%3Aissue+is%3Aopen+label%3A%22p%3A%20material%20design%22

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

workspace:
  - example

dependencies:
  collection: ^1.19.1
  cupertino_ui:
    # TODO(justinmc): Use the pub.dev package when published.
    path: ../cupertino_ui
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  material_color_utilities: ^0.13.0
  vector_math: ^2.2.0

dev_dependencies:
  args: ^2.7.0
  file: ^7.0.1
  flutter_goldens:
    path: ../../script/flutter_goldens
  flutter_test:
    sdk: flutter
  # To track memory leaks.
  leak_tracker_flutter_testing: ^3.0.10
  meta: ^1.18.0
  path: ^1.9.1
  platform: ^3.1.6

topics:
  - ui
  - widgets
  - material
