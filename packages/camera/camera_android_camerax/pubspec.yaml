name: camera_android_camerax
description: Android implementation of the camera plugin using the CameraX library.
repository: https://github.com/flutter/packages/tree/main/packages/camera/camera_android_camerax
issue_tracker: https://github.com/flutter/flutter/issues?q=is%3Aissue+is%3Aopen+label%3A%22p%3A+camera%22
version: 0.7.4

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

flutter:
  plugin:
    implements: camera
    platforms:
      android:
        package: io.flutter.plugins.camerax
        pluginClass: CameraAndroidCameraxPlugin
        dartPluginClass: AndroidCameraCameraX

dependencies:
  async: ^2.5.0
  camera_platform_interface: ^2.13.0
  flutter:
    sdk: flutter
  meta: ^1.7.0
  stream_transform: ^2.1.0

dev_dependencies:
  build_runner: ^2.2.0
  dart_code_linter: 4.1.5
  dart_skills_lint:
    git:
      url: https://github.com/flutter/skills.git
      path: tool/dart_skills_lint
      ref: 8f85e82be6da429980f7cfe84f2f214a06cbfee1
  flutter_test:
    sdk: flutter
  leak_tracker_flutter_testing: any
  logging: ^1.2.0
  mockito: ^5.4.4
  path: ^1.8.0
  pigeon: ^26.1.4

topics:
  - camera
