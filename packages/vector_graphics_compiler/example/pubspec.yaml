name: vector_graphics_compiler_example
description: >
  Demonstrates using vector_graphics_compiler as a build-time SVG asset
  transformer.
publish_to: none

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  vector_graphics:
    # When depending on this package from a real application you should use:
    #   vector_graphics: ^x.y.z
    # See https://dart.dev/tools/pub/dependencies#version-constraints
    # The example app is bundled with the plugin so we use a path dependency on
    # the parent directory to use the current plugin's version.
    path: ../../vector_graphics

dev_dependencies:
  flutter_test:
    sdk: flutter
  vector_graphics_compiler:
    path: ../

# #docregion transformer-config
flutter:
  assets:
    - path: assets/dart_logo.svg
      transformers:
        - package: vector_graphics_compiler
# #enddocregion transformer-config
  uses-material-design: true
