name: shared_preferences_example
description: Demonstrates how to use the shared_preferences plugin.
publish_to: none

environment:
  sdk: ^3.1.0
  flutter: ">=3.13.0"

dependencies:
  flutter:
    sdk: flutter
  shared_preferences:
    # When depending on this package from a real application you should use:
    #   shared_preferences: ^x.y.z
    # See https://dart.dev/tools/pub/dependencies#version-constraints
    # The example app is bundled with the plugin so we use a path dependency on
    # the parent directory to use the current plugin's version.
    path: ../
  shared_preferences_platform_interface: ^2.3.2

dev_dependencies:
  build_runner: ^2.1.10
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

# FOR TESTING AND INITIAL REVIEW ONLY. DO NOT MERGE.
# See https://github.com/flutter/flutter/wiki/Contributing-to-Plugins-and-Packages#changing-federated-plugins
dependency_overrides:
   {shared_preferences: {path: ../../../shared_preferences/shared_preferences}, shared_preferences_android: {path: ../../../shared_preferences/shared_preferences_android}, shared_preferences_foundation: {path: ../../../shared_preferences/shared_preferences_foundation}, shared_preferences_linux: {path: ../../../shared_preferences/shared_preferences_linux}, shared_preferences_platform_interface: {path: ../../../shared_preferences/shared_preferences_platform_interface}, shared_preferences_web: {path: ../../../shared_preferences/shared_preferences_web}, shared_preferences_windows: {path: ../../../shared_preferences/shared_preferences_windows}}
