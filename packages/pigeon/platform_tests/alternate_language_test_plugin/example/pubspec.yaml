name: alternate_language_test_plugin_example
description: Pigeon test harness for alternate plugin languages.
publish_to: 'none'

environment:
  sdk: ^3.9.0

dependencies:
  alternate_language_test_plugin:
    path: ../
  flutter:
    sdk: flutter
  shared_test_plugin_code:
    path: ../../shared_test_plugin_code

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

dependency_overrides:
  ffi: 
    git:
      url: https://github.com/dart-lang/native/
      path: pkgs/ffi
      ref: 378a68e431e14779606bcbe721c05cb14bf4333f
  ffigen: 
    git:
      url: https://github.com/dart-lang/native/
      path: pkgs/ffigen
      ref: 378a68e431e14779606bcbe721c05cb14bf4333f
  objective_c: 
    git:
      url: https://github.com/dart-lang/native/
      path: pkgs/objective_c
      ref: 378a68e431e14779606bcbe721c05cb14bf4333f
  swift2objc: 
    git:
      url: https://github.com/dart-lang/native/
      path: pkgs/swift2objc
      ref: 378a68e431e14779606bcbe721c05cb14bf4333f
