name: alternate_language_test_plugin_example
description: Pigeon test harness for alternate plugin languages.
publish_to: 'none'

environment:
  sdk: ^3.9.0

dependencies:
  alternate_language_test_plugin:
    path: ../
  flutter:
    sdk: flutter
  shared_test_plugin_code:
    path: ../../shared_test_plugin_code

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
dependency_overrides:
  ffi:
    git:
      url: https://github.com/dart-lang/native/
      path: pkgs/ffi
      ref: a1b844b93b95882fc9d47a19371a63a163132dd6
  ffigen:
    git:
      url: https://github.com/dart-lang/native/
      path: pkgs/ffigen
      ref: a1b844b93b95882fc9d47a19371a63a163132dd6
  objective_c:
    git:
      url: https://github.com/dart-lang/native/
      path: pkgs/objective_c
      ref: a1b844b93b95882fc9d47a19371a63a163132dd6
  swift2objc:
    git:
      url: https://github.com/dart-lang/native/
      path: pkgs/swift2objc
      ref: a1b844b93b95882fc9d47a19371a63a163132dd6
