changelog: |
  - Adds `maybePop` to `GoRouter`, `GoRouterDelegate`, and `GoRouterHelper`. This method mirrors [Navigator.maybePop]'s single-navigator scope by asking only the current navigator (unlike system back via `popRoute`, which may walk multiple navigators), returning `false` instead of throwing when that navigator has nothing to pop, and calling [GoRouter.restore] when a pop completes synchronously.
version: minor

