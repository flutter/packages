name: cupertino_ui_examples
description: API code samples for the cupertino_ui package.
publish_to: 'none'

version: 1.0.0

environment:
  sdk: ^3.12.0
resolution: workspace

dependencies:
  flutter:
    sdk: flutter

  collection: any
  vector_math: any
  web: any
  test: any
  cupertino_ui:
    path: ..
  material_ui:
    # TODO(justinmc): Use the pub.dev package when published.
    path: ../../material_ui

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter
  flutter_goldens:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true
