include: ../../analysis_options.yaml

analyzer:
  exclude:
    - "test_fixes/**"
    # TODO(justinmc): Remove the following exclusion when cross-imports are
    # fixed. See https://github.com/flutter/flutter/issues/177028.
    - "temporarily_disabled_tests/**"
    - build/**
    - android/**
    - ios/**
    - web/**
    - windows/**
    - macos/**
    - linux/**

linter:
  rules:
    # TODO(dkwingsmt): Remove when https://github.com/dart-lang/sdk/issues/63777 is fixed.
    unintended_html_in_doc_comment: false
